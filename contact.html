<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Simple Business Help</title>
    <meta
      name="description"
      content="Contact Simple Business Help to share your project details and request next steps."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Literata:opsz,wght@7..72,500;7..72,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="grain"></div>

    <header class="topbar">
      <div class="brand">simplebusinesshelp.com</div>
      <button class="menu-toggle" aria-expanded="false" aria-controls="site-nav">Menu</button>
      <nav id="site-nav" class="site-nav">
        <a href="index.html#services">Services</a>
        <a href="index.html#process">Process</a>
        <a href="index.html#results">Results</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </nav>
    </header>

    <main class="workspace">
      <article class="editor editor-full" id="top">
        <div class="editor-bar">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
          <span class="filename">contact.md</span>
        </div>

        <section class="pane reveal">
          <h1><span class="token-hash">#</span> Contact</h1>
          <p>
            Tell us about your business and what feels stuck. We usually reply with next steps
            within 2 business days.
          </p>

          <!-- Replace the placeholder Formspree endpoint below with your real form URL, e.g. https://formspree.io/f/xxxxabcd -->
          <form
            class="contact-form"
            action="https://formspree.io/f/REPLACE_WITH_YOUR_FORM_ID"
            method="POST"
          >
            <label for="name">Name</label>
            <input id="name" name="name" type="text" autocomplete="name" required />

            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />

            <label for="subject">Subject <span class="optional">(optional)</span></label>
            <input id="subject" name="subject" type="text" autocomplete="off" />

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required></textarea>

            <div class="honeypot" aria-hidden="true">
              <label for="company">Leave this field empty</label>
              <input
                id="company"
                name="_gotcha"
                type="text"
                tabindex="-1"
                autocomplete="off"
              />
            </div>

            <input type="hidden" name="_subject" value="New website contact submission" />
            <!-- Optional: update _next if your site domain/path changes -->
            <input type="hidden" name="_next" value="https://simplebusinesshelp.com/thanks.html" />
            <button class="cta" type="submit">Send Message</button>
          </form>
        </section>
      </article>
    </main>

    <footer class="footer">
      <p>
        Copyright <span id="year"></span> Simple Business Help ·
        <a href="contact.html">Contact</a>
      </p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
